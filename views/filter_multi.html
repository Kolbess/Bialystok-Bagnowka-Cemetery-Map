<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cemetery Restoration - Filter Multi</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>

<body>
    <div class="app-shell">
        <header class="app-header">
            <div class="logo" style="display: flex; align-items: center;"><img src="../BCRF-logo.webp" alt="BCRF Logo"
                    style="height: 40px; margin-right: 16px;">Bialystok Cemetery Map</div>
            <div class="top-nav">
                <div class="nav-item active">Map View</div>
                <div class="nav-item">Surname Search</div>
                <div class="nav-item">Legend</div>
            </div>
        </header>
        <div class="app-body">
            <aside class="sidebar">
                <h3>Filters</h3>
                <div class="input-group">
                    <label>Section</label>
                    <input type="text" class="input-glass" value="45">
                </div>
                <div class="input-group">
                    <label>Row</label>
                    <input type="text" class="input-glass" value="12">
                </div>
                <div class="input-group">
                    <label>Surname</label>
                    <input type="text" class="input-glass" value="Smith">
                </div>
                <button class="btn btn-primary" style="margin-top: 16px;">Search</button>
                <div class="spacer"></div>
                <div class="support-btn-wrapper">
                    <button class="btn btn-secondary btn-icon">?</button>
                </div>
            </aside>
            <main class="map-container">
                <div class="map-grid-wrapper">
                    <div class="map-grid" id="grid"></div>
                </div>
                <script>
                    const grid = document.getElementById('grid');
                    const highlighted = [45, 46];
                    for (let i = 0; i < 100; i++) {
                        const r = Math.floor(i / 10);
                        const c = i % 10;
                        const sectionNum = (9 - r) * 10 + (c + 1);
                        const s = document.createElement('div');
                        s.className = 'map-section' + (highlighted.includes(sectionNum) ? ' highlight-multi' : '');
                        s.style.position = 'relative';
                        s.textContent = 'S' + sectionNum;
                        if (highlighted.includes(sectionNum)) {
                            // row stripe overlay
                            const row = document.createElement('div');
                            row.style.cssText = 'position:absolute;left:0;right:0;top:45%;height:12%;background:rgba(119,90,25,0.5);';
                            s.appendChild(row);
                            // grave dot
                            const dot = document.createElement('div');
                            dot.style.cssText = 'width:8px;height:8px;border-radius:50%;background:var(--surface-container-lowest);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 5px #fff;';
                            s.appendChild(dot);
                        }
                        grid.appendChild(s);
                    }
                </script>
            </main>
        </div>
    </div>
</body>

</html>
