<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cemetery Restoration - Grave Hover</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .map-section-zoomed {
            background-color: var(--surface-container-low);
            border-radius: 3px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 6px;
            position: relative;
            overflow: visible;
        }

        .section-label {
            font-size: 0.6rem;
            color: var(--primary-container);
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
            opacity: 0.6;
        }

        .graves-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px 8px;
            width: 100%;
            flex: 1;
            padding: 8px;
        }

        .grave-plot {
            width: 16px;
            height: 24px;
            background: rgba(0, 36, 69, 0.15);
            border-radius: 3px 3px 1px 1px;
            cursor: pointer;
            transition: background 0.15s, transform 0.15s;
            justify-self: center;
            align-self: center;
        }

        .grave-plot.hovered {
            background: var(--secondary);
            box-shadow: 0 0 0 2px var(--secondary), 0 0 8px var(--secondary);
            z-index: 2;
        }

        .map-grid-zoom {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 8px;
            width: 640px;
            height: 640px;
            border-bottom: 12px solid var(--primary-container);
            padding-bottom: 12px;
        }

        /* Tooltip anchored to the hovered grave */
        .grave-tooltip {
            position: absolute;
            bottom: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%);
            min-width: 180px;
            padding: 12px 16px;
            z-index: 300;
            pointer-events: none;
        }

        .grave-tooltip h4 {
            margin: 0 0 4px 0;
            font-size: 0.9rem;
            color: var(--secondary);
            font-family: var(--font-display);
        }

        .grave-tooltip p {
            margin: 0;
            font-size: 0.78rem;
            opacity: 0.9;
        }
    </style>
    <script src="app.js" defer></script>
</head>

<body>
    <div class="app-shell">
        <header class="app-header">
            <div class="logo" style="display: flex; align-items: center;"><img src="../BCRF-logo.webp" alt="BCRF Logo"
                    style="height: 40px; margin-right: 16px;">Bialystok Cemetery Map</div>
            <div class="top-nav">
                <div class="nav-item active">Map View</div>
                <div class="nav-item">Surname Search</div>
                <div class="nav-item">Legend</div>
            </div>
        </header>
        <div class="app-body">
            <aside class="sidebar">
                <h3>Filters</h3>
                <div class="input-group">
                    <label>Section</label>
                    <input type="text" class="input-glass" placeholder="e.g. A, B, C">
                </div>
                <div class="input-group">
                    <label>Row</label>
                    <input type="text" class="input-glass" placeholder="e.g. 1, 2, 3">
                </div>
                <div class="input-group">
                    <label>Surname</label>
                    <input type="text" class="input-glass" placeholder="e.g. Smith">
                </div>
                <button class="btn btn-primary" style="margin-top:16px;">Search</button>
                <div class="spacer"></div>
                <div class="support-btn-wrapper">
                    <button class="btn btn-secondary btn-icon">?</button>
                </div>
            </aside>
            <main class="map-container">
                <div class="map-grid-wrapper">
                    <div class="map-grid-zoom" id="grid"></div>
                </div>
                <script>
                    const grid = document.getElementById('grid');
                    const sections = [44, 45, 54, 55];
                    const ROWS = 4, COLS = 5;
                    const rotations = [5, -5, 0, -15, 10, -3, 8, -10, 2, -7];
                    // The grave to show hovered: section index 1 (=45), grave 7 (0-indexed)
                    const HOVER_SECTION = 1, HOVER_IDX = 7;

                    sections.forEach((num, si) => {
                        const s = document.createElement('div');
                        s.className = 'map-section-zoomed';
                        const label = document.createElement('div');
                        label.className = 'section-label';
                        label.textContent = 'Section ' + num;
                        s.appendChild(label);
                        const gGrid = document.createElement('div');
                        gGrid.className = 'graves-grid';
                        for (let j = 0; j < ROWS * COLS; j++) {
                            const g = document.createElement('div');
                            const isHovered = (si === HOVER_SECTION && j === HOVER_IDX);
                            g.className = 'grave-plot' + (isHovered ? ' hovered' : '');
                            g.style.position = 'relative';
                            g.style.transform = `rotate(${rotations[j % rotations.length]}deg)`;
                            if (isHovered) {
                                const tip = document.createElement('div');
                                tip.className = 'glass-panel grave-tooltip';
                                tip.innerHTML = `
                                    <h4>Jan Kowalski</h4>
                                    <p>Section ${num} &bull; Row ${Math.floor(j / COLS) + 1} &bull; Plot ${(j % COLS) + 1}</p>
                                `;
                                g.appendChild(tip);
                            }
                            gGrid.appendChild(g);
                        }
                        s.appendChild(gGrid);
                        grid.appendChild(s);
                    });
                </script>
            </main>
        </div>
    </div>
</body>

</html>
