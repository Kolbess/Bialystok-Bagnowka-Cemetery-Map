<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cemetery Restoration - Legend On</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>

<body>
    <div class="app-shell">
        <header class="app-header">
            <div class="logo" style="display: flex; align-items: center;"><img src="../BCRF-logo.webp" alt="BCRF Logo"
                    style="height: 40px; margin-right: 16px;">Bialystok Cemetery Map</div>
            <div class="top-nav">
                <div class="nav-item active">Map View</div>
                <div class="nav-item">Surname Search</div>
                <div class="nav-item" style="color: var(--secondary); border-bottom: 2px solid var(--secondary);">Legend
                </div>
            </div>
        </header>
        <div class="app-body">
            <aside class="sidebar">
                <h3>Filters</h3>
                <div class="input-group">
                    <label>Section</label>
                    <input type="text" class="input-glass" placeholder="e.g. A, B, C">
                </div>
                <div class="input-group">
                    <label>Row</label>
                    <input type="text" class="input-glass" placeholder="e.g. 1, 2, 3">
                </div>
                <div class="input-group">
                    <label>Surname</label>
                    <input type="text" class="input-glass" placeholder="e.g. Smith">
                </div>
                <button class="btn btn-primary" style="margin-top: 16px;">Search</button>
                <div class="spacer"></div>
                <div class="support-btn-wrapper">
                    <button class="btn btn-secondary btn-icon">?</button>
                </div>
            </aside>
            <main class="map-container" style="position: relative;">
                <!-- Legend panel floats ABOVE the map sections with z-index -->
                <div class="glass-panel legend-panel open">
                    <h3 style="margin-bottom: 20px;">Legend</h3>
                    <div style="display:flex; align-items:center; gap: 12px; margin-bottom: 16px;">
                        <div
                            style="width:20px; height:20px; background:var(--secondary); border-radius:2px; flex-shrink:0;">
                        </div>
                        <span>Highlighted Section</span>
                    </div>
                    <div style="display:flex; align-items:center; gap: 12px; margin-bottom: 16px;">
                        <div
                            style="width:20px; height:20px; background:linear-gradient(180deg, var(--surface-container-low) 33%, var(--secondary) 33%, var(--secondary) 66%, var(--surface-container-low) 66%); border-radius:2px; flex-shrink:0;">
                        </div>
                        <span>Highlighted Row</span>
                    </div>
                    <div style="display:flex; align-items:center; gap: 12px;">
                        <div
                            style="width:20px; height:20px; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
                            <div style="width:8px; height:8px; border-radius:50%; background:var(--secondary);"></div>
                        </div>
                        <span>Located Grave</span>
                    </div>
                </div>

                <div class="map-grid-wrapper">
                    <div class="map-grid" id="grid"></div>
                </div>
                <script>
                    const grid = document.getElementById('grid');
                    for (let i = 1; i <= 100; i++) {
                        const s = document.createElement('div');
                        s.className = 'map-section';
                        s.textContent = 'S' + i;
                        grid.appendChild(s);
                    }
                </script>
            </main>
        </div>
    </div>
</body>

</html>
