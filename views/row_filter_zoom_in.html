<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cemetery Restoration - Row Filter Zoom In</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .map-section-zoomed {
            background-color: var(--surface-container-low);
            border-radius: 3px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 6px;
            position: relative;
            overflow: hidden;
        }

        .section-label {
            font-size: 0.6rem;
            color: var(--primary-container);
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
            opacity: 0.6;
        }

        .graves-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px 8px;
            width: 100%;
            flex: 1;
            padding: 8px;
        }

        .grave-plot {
            width: 16px;
            height: 24px;
            background: rgba(0, 36, 69, 0.15);
            border-radius: 3px 3px 1px 1px;
            cursor: pointer;
            transition: background 0.15s, transform 0.15s;
            justify-self: center;
            align-self: center;
        }

        .grave-plot.row-hl {
            background: var(--secondary);
            opacity: 0.85;
            box-shadow: 0 0 4px var(--secondary);
        }

        .map-grid-zoom {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 8px;
            width: 640px;
            height: 640px;
            border-bottom: 12px solid var(--primary-container);
            padding-bottom: 12px;
        }
    </style>
    <script src="app.js" defer></script>
</head>

<body>
    <div class="app-shell">
        <header class="app-header">
            <div class="logo" style="display: flex; align-items: center;"><img src="../BCRF-logo.webp" alt="BCRF Logo"
                    style="height: 40px; margin-right: 16px;">Bialystok Cemetery Map</div>
            <div class="top-nav">
                <div class="nav-item active">Map View</div>
                <div class="nav-item">Surname Search</div>
                <div class="nav-item">Legend</div>
            </div>
        </header>
        <div class="app-body">
            <aside class="sidebar">
                <h3>Filters</h3>
                <div class="input-group">
                    <label>Section</label>
                    <input type="text" class="input-glass" placeholder="e.g. A, B, C">
                </div>
                <div class="input-group">
                    <label>Row</label>
                    <input type="text" class="input-glass" value="12">
                </div>
                <div class="input-group">
                    <label>Surname</label>
                    <input type="text" class="input-glass" placeholder="e.g. Smith">
                </div>
                <button class="btn btn-primary" style="margin-top:16px;">Search</button>
                <div class="spacer"></div>
                <div class="support-btn-wrapper">
                    <button class="btn btn-secondary btn-icon">?</button>
                </div>
            </aside>
            <main class="map-container">
                <div class="map-grid-wrapper" style="padding-top: 50px;">
                    <div class="map-grid-zoom" id="grid"></div>
                </div>
                <script>
                    const grid = document.getElementById('grid');
                    const sections = [44, 45, 54, 55];
                    const ROWS = 4, COLS = 5;
                    const HIGHLIGHTED_ROW = 2; // 0-indexed row to highlight
                    const rotations = [5, -5, 0, -15, 10, -3, 8, -10, 2, -7];

                    sections.forEach(num => {
                        const s = document.createElement('div');
                        s.className = 'map-section-zoomed';
                        const label = document.createElement('div');
                        label.className = 'section-label';
                        label.textContent = 'Section ' + num;
                        s.appendChild(label);
                        const gGrid = document.createElement('div');
                        gGrid.className = 'graves-grid';
                        let idx = 0;
                        for (let r = 0; r < ROWS; r++) {
                            for (let c = 0; c < COLS; c++) {
                                const g = document.createElement('div');
                                g.className = 'grave-plot' + (r === HIGHLIGHTED_ROW ? ' row-hl' : '');
                                g.style.transform = `rotate(${rotations[idx % rotations.length]}deg)`;
                                gGrid.appendChild(g);
                                idx++;
                            }
                        }
                        s.appendChild(gGrid);
                        grid.appendChild(s);
                    });
                </script>
            </main>
        </div>
    </div>
</body>

</html>
